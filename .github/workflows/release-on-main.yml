# .github/workflows/release-on-main.yml
name: Release on Main Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          SLUG=$(echo "$COMMIT_MSG" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g' | sed -E 's/^-+|-+$//g' | cut -c1-40)
          TAG="prod-$(date +%Y%m%d-%H%M%S)-${SLUG}"
          gh release create "$TAG" --title "$TAG" --notes "Deployed to main: $COMMIT_MSG" --target main
